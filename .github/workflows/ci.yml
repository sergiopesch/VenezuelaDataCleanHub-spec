name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vdch
          POSTGRES_USER: vdch
          POSTGRES_PASSWORD: vdch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vdch -d vdch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          VDCH_DEV_AUTH_ENABLED: "true"
          VDCH_ALLOW_POLICY_BYPASS_FOR_LOCAL_DEV: "true"
          VDCH_OPA_ENABLED: "false"
          VDCH_FINGERPRINT_SECRET: "ci-synthetic-fingerprint-secret"
        run: pytest

      - name: Verify migrations
        env:
          VDCH_DATABASE_URL: postgresql+psycopg://vdch:vdch@127.0.0.1:5432/vdch
        run: alembic upgrade head

      - name: Check whitespace
        run: git diff --check
